name: Daily News Update

on:
  schedule:
    - cron: '30 1 * * *'  # 7:00 AM IST daily
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run daily update
        working-directory: agentic-job-updates/scripts
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python update_news.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add agentic-job-updates/data/content.json agentic-job-updates/dist/index.html agentic-job-updates/dist/ai-layoffs-and-jobs.html
          git diff --cached --quiet || git commit -m "chore: daily news update $(date -u '+%Y-%m-%d')"
          git push
